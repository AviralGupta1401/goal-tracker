<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <rect x="0" y="0" width="1200" height="60" fill="url(#header)" rx="12"/>
  <text x="600" y="38" text-anchor="middle" fill="white" font-size="24" font-weight="700">GoalTracker — Architecture Diagram</text>
  <text x="600" y="55" text-anchor="middle" fill="#bfdbfe" font-size="13">ATOMQUEST HACKATHON 1.0 — In-House Goal Setting &amp; Tracking Portal</text>

  <!-- CLIENT SECTION -->
  <rect x="30" y="80" width="450" height="420" rx="10" fill="white" filter="url(#shadow)" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="30" y="80" width="450" height="40" rx="10" fill="#1e40af"/>
  <rect x="30" y="100" width="450" height="20" fill="#1e40af"/>
  <text x="255" y="106" text-anchor="middle" fill="white" font-size="16" font-weight="600">CLIENT — React + Vite (Port 5173)</text>

  <text x="55" y="150" font-size="12" font-weight="600" fill="#475569">PAGES (Role-Based)</text>
  <rect x="55" y="160" width="120" height="28" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="115" y="179" text-anchor="middle" font-size="11" fill="#1e40af">Employee Dashboard</text>
  <rect x="185" y="160" width="120" height="28" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="245" y="179" text-anchor="middle" font-size="11" fill="#1e40af">Manager Dashboard</text>
  <rect x="315" y="160" width="120" height="28" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="375" y="179" text-anchor="middle" font-size="11" fill="#1e40af">Admin Dashboard</text>

  <text x="55" y="220" font-size="12" font-weight="600" fill="#475569">COMPONENTS</text>
  <rect x="55" y="230" width="100" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="105" y="246" text-anchor="middle" font-size="10" fill="#334155">GoalForm</text>
  <rect x="165" y="230" width="100" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="215" y="246" text-anchor="middle" font-size="10" fill="#334155">GoalCard</text>
  <rect x="275" y="230" width="120" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="335" y="246" text-anchor="middle" font-size="10" fill="#334155">CheckInForm</text>

  <rect x="55" y="264" width="100" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="105" y="280" text-anchor="middle" font-size="10" fill="#334155">Layout</text>
  <rect x="165" y="264" width="100" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="215" y="280" text-anchor="middle" font-size="10" fill="#334155">Sidebar</text>
  <rect x="275" y="264" width="120" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="335" y="280" text-anchor="middle" font-size="10" fill="#334155">Recharts (Analytics)</text>

  <text x="55" y="325" font-size="12" font-weight="600" fill="#475569">STATE &amp; ROUTING</text>
  <rect x="55" y="335" width="180" height="24" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="145" y="351" text-anchor="middle" font-size="10" fill="#92400e">React Router v7 (Role-based)</text>
  <rect x="245" y="335" width="180" height="24" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="335" y="351" text-anchor="middle" font-size="10" fill="#92400e">Axios (JWT Interceptor)</text>

  <text x="55" y="395" font-size="12" font-weight="600" fill="#475569">VALIDATION</text>
  <rect x="55" y="405" width="410" height="60" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="260" y="425" text-anchor="middle" font-size="10" fill="#065f46">Weightage Total = 100% | Min Weightage = 10% | Max Goals = 8</text>
  <text x="260" y="445" text-anchor="middle" font-size="10" fill="#065f46">Role-based Access Control | Goal Lock on Approval | Audit Trail</text>

  <!-- ARROW CLIENT TO SERVER -->
  <line x1="480" y1="280" x2="720" y2="280" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  <text x="600" y="270" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="600">HTTP REST API + JWT Auth</text>

  <!-- SERVER SECTION -->
  <rect x="720" y="80" width="450" height="420" rx="10" fill="white" filter="url(#shadow)" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="720" y="80" width="450" height="40" rx="10" fill="#059669"/>
  <rect x="720" y="100" width="450" height="20" fill="#059669"/>
  <text x="945" y="106" text-anchor="middle" fill="white" font-size="16" font-weight="600">SERVER — Express + Node.js (Port 3001)</text>

  <text x="745" y="150" font-size="12" font-weight="600" fill="#475569">ROUTES</text>
  <rect x="745" y="160" width="130" height="28" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="810" y="179" text-anchor="middle" font-size="11" fill="#065f46">/api/auth</text>
  <rect x="885" y="160" width="130" height="28" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="950" y="179" text-anchor="middle" font-size="11" fill="#065f46">/api/goals</text>
  <rect x="1025" y="160" width="130" height="28" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="1090" y="179" text-anchor="middle" font-size="11" fill="#065f46">/api/checkins</text>
  <rect x="745" y="198" width="130" height="28" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="810" y="217" text-anchor="middle" font-size="11" fill="#065f46">/api/admin</text>

  <text x="745" y="260" font-size="12" font-weight="600" fill="#475569">MIDDLEWARE</text>
  <rect x="745" y="270" width="130" height="24" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="810" y="286" text-anchor="middle" font-size="10" fill="#92400e">JWT Auth</text>
  <rect x="885" y="270" width="130" height="24" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="950" y="286" text-anchor="middle" font-size="10" fill="#92400e">Role-Based Access</text>
  <rect x="1025" y="270" width="130" height="24" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="1090" y="286" text-anchor="middle" font-size="10" fill="#92400e">Audit Logging</text>

  <text x="745" y="335" font-size="12" font-weight="600" fill="#475569">BUSINESS LOGIC</text>
  <rect x="745" y="345" width="410" height="55" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="950" y="365" text-anchor="middle" font-size="10" fill="#5b21b6">Goal Validation | Weightage Check | Approval Workflow</text>
  <text x="950" y="382" text-anchor="middle" font-size="10" fill="#5b21b6">Progress Score Calculation (UoM-specific) | Shared Goals</text>

  <text x="745" y="435" font-size="12" font-weight="600" fill="#475569">TECHNOLOGIES</text>
  <rect x="745" y="445" width="90" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="790" y="461" text-anchor="middle" font-size="10" fill="#334155">Express</text>
  <rect x="845" y="445" width="90" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="890" y="461" text-anchor="middle" font-size="10" fill="#334155">JWT</text>
  <rect x="945" y="445" width="90" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="990" y="461" text-anchor="middle" font-size="10" fill="#334155">bcrypt</text>
  <rect x="1045" y="445" width="110" height="24" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="1100" y="461" text-anchor="middle" font-size="10" fill="#334155">Mongoose</text>

  <!-- ARROW SERVER TO DB -->
  <line x1="945" y1="500" x2="945" y2="620" stroke="#059669" stroke-width="2" marker-end="url(#arrowhead2)"/>
  <defs>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>
  <text x="965" y="565" font-size="11" fill="#059669" font-weight="600">Mongoose ODM</text>

  <!-- DATABASE -->
  <rect x="720" y="620" width="450" height="240" rx="10" fill="white" filter="url(#shadow)" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="720" y="620" width="450" height="40" rx="10" fill="#7c3aed"/>
  <rect x="720" y="640" width="450" height="20" fill="#7c3aed"/>
  <text x="945" y="646" text-anchor="middle" fill="white" font-size="16" font-weight="600">DATABASE — MongoDB</text>

  <text x="745" y="695" font-size="12" font-weight="600" fill="#475569">COLLECTIONS</text>
  <rect x="745" y="705" width="180" height="35" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="835" y="722" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">users</text>
  <text x="835" y="736" text-anchor="middle" font-size="9" fill="#7c3aed">name, email, role, dept, managerId</text>

  <rect x="940" y="705" width="210" height="35" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="1045" y="722" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">goals</text>
  <text x="1045" y="736" text-anchor="middle" font-size="9" fill="#7c3aed">title, uom, target, weightage, status</text>

  <rect x="745" y="750" width="180" height="35" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="835" y="767" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">checkins</text>
  <text x="835" y="781" text-anchor="middle" font-size="9" fill="#7c3aed">quarter, actual, score, comments</text>

  <rect x="940" y="750" width="210" height="35" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="1045" y="767" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">audit_logs</text>
  <text x="1045" y="781" text-anchor="middle" font-size="9" fill="#7c3aed">entity, action, user, changes, timestamp</text>

  <rect x="745" y="795" width="405" height="35" rx="6" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="947" y="812" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">goal_cycles</text>
  <text x="947" y="826" text-anchor="middle" font-size="9" fill="#7c3aed">year, quarter dates, active status</text>

  <!-- USER ROLES SECTION -->
  <rect x="30" y="620" width="650" height="240" rx="10" fill="white" filter="url(#shadow)" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="30" y="620" width="650" height="40" rx="10" fill="#475569"/>
  <rect x="30" y="640" width="650" height="20" fill="#475569"/>
  <text x="355" y="646" text-anchor="middle" fill="white" font-size="16" font-weight="600">USER ROLES &amp; WORKFLOWS</text>

  <!-- Employee -->
  <rect x="50" y="680" width="190" height="160" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="145" y="705" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">EMPLOYEE</text>
  <text x="60" y="730" font-size="10" fill="#334155">• Create goal sheet</text>
  <text x="60" y="748" font-size="10" fill="#334155">• Submit for approval</text>
  <text x="60" y="766" font-size="10" fill="#334155">• Edit goals (draft/rejected)</text>
  <text x="60" y="784" font-size="10" fill="#334155">• Quarterly check-ins</text>
  <text x="60" y="802" font-size="10" fill="#334155">• View locked goals</text>
  <text x="60" y="820" font-size="10" fill="#334155">• Track progress scores</text>

  <!-- Manager -->
  <rect x="255" y="680" width="190" height="160" rx="8" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="350" y="705" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">MANAGER (L1)</text>
  <text x="265" y="730" font-size="10" fill="#334155">• Review team goals</text>
  <text x="265" y="748" font-size="10" fill="#334155">• Approve / reject inline</text>
  <text x="265" y="766" font-size="10" fill="#334155">• Edit targets/weightage</text>
  <text x="265" y="784" font-size="10" fill="#334155">• Quarterly check-ins</text>
  <text x="265" y="802" font-size="10" fill="#334155">• Add feedback comments</text>
  <text x="265" y="820" font-size="10" fill="#334155">• Track completion rates</text>

  <!-- Admin -->
  <rect x="460" y="680" width="190" height="160" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="555" y="705" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">ADMIN / HR</text>
  <text x="470" y="730" font-size="10" fill="#334155">• Manage users &amp; roles</text>
  <text x="470" y="748" font-size="10" fill="#334155">• Configure cycles</text>
  <text x="470" y="766" font-size="10" fill="#334155">• Share departmental KPIs</text>
  <text x="470" y="784" font-size="10" fill="#334155">• Unlock approved goals</text>
  <text x="470" y="802" font-size="10" fill="#334155">• Export CSV reports</text>
  <text x="470" y="820" font-size="10" fill="#334155">• Audit trail &amp; analytics</text>

  <!-- Footer -->
  <text x="600" y="885" text-anchor="middle" font-size="11" fill="#94a3b8">Tech Stack: React 19 + Vite + TypeScript | Express + Node.js + JWT | MongoDB + Mongoose | Tailwind CSS v4 | Recharts</text>
</svg>
